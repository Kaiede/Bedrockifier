version: '3.7'

services:
  backup:
    image: kaiede/minecraft-bedrock-backup
    restart: always
    # Make sure the minecraft image starts before the backup
    depends_on:
      - "public"
    environment:
      # Useful for making sure your logs have a proper timestamp
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - minecraft-backup:/config
      - ./config.yml:/config/config.yml:ro
      - minecraft-server-backups:/data
      - bedrock-public-data:/bedrock_public:ro

  public:
    image: itzg/minecraft-bedrock-server
    restart: always
    container_name: bedrock_public
    # Expose the mc-server-runner's SSH port to just the backup container
    expose:
      - 2222
    # Make the minecraft server port public
    ports:
      - 19132:19132/udp
    environment:
      # Enable SSH
      ENABLE_SSH: "TRUE"
      # Server settings
      EULA: "TRUE"
      LEVEL_NAME: ${LEVEL_NAME:-PublicSMP}
    volumes:
      - bedrock-public-data:/data
    stdin_open: true
    tty: true

  restore:
    image: kaiede/minecraft-bedrock-backup
    profiles:
      - restore
    entrypoint: ["/opt/bedrock/bedrockifier", "restore"]
    network_mode: "none"
    environment:
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./config.yml:/config/config.yml:ro
      - minecraft-server-backups:/data:ro
      - bedrock-public-data:/bedrock_public
    stdin_open: true
    tty: true

volumes:
  # Allows backup to store persistent configuration for itself
  minecraft-backup:
    
  minecraft-server-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BEDROCKIFIER_BACKUPS_DIR:-/opt/minecraft/backups}

  bedrock-public-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BEDROCK_PUBLIC_DATA_DIR:-/opt/bedrock/public}
