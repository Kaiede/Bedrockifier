version: '3.7'

services:
  backup:
    image: kaiede/minecraft-bedrock-backup
    restart: always
    # Make sure the minecraft image starts before the backup
    depends_on:
      - "public"
    environment:
        # Useful for making sure your logs have a proper timestamp
        TZ: "America/Los_Angeles"
    volumes:
      # (Optional) Map a configuration folder separately from the backups.
      # - /opt/minecraft/backup-config:/config
      # Backup output location (writeable)
      - minecraft-server-backups:/data
      # Read-only source mount for server data used by backups
      - minecraft-server-data:/bedrock_public:ro

  public:
    image: itzg/minecraft-bedrock-server
    restart: always
    container_name: bedrock_public
    # Expose the mc-server-runner's SSH port to just the backup container
    expose:
      - 2222
    # Make the minecraft server port public
    ports:
      - 19132:19132/udp
    environment:
      # Enable SSH
      ENABLE_SSH: "TRUE"
      # Server settings
      EULA: "TRUE"
      LEVEL_NAME: ${LEVEL_NAME:-PublicSMP}
    volumes:
      - minecraft-server-data:/data
    stdin_open: true
    tty: true

  restore-menu:
    image: local/bedrockifier-restore:latest
    profiles:
      - tools
      - restore
    # Run this ad-hoc with either profile:
    # - docker compose --profile restore run --rm restore-menu
    # - docker compose --profile tools run --rm restore-menu
    # Example-only image build; this is not a separately published artifact.
    build:
      context: ../..
      dockerfile: Examples/bedrock-itzg-ssh-recovery-isolated/restore.dockerfile
    # Restore from local mounts only; no container networking required.
    network_mode: "none"
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      TERM: "xterm-256color"
      # Defaults to /server/worlds/<LEVEL_NAME> when a world name can't be inferred
      LEVEL_NAME: ${LEVEL_NAME:-PublicSMP}
      BACKUP_DIR: "/backups"
      RESTORE_UID: ${UID:-1000}
      RESTORE_GID: ${GID:-1000}
      RESTORE_MODE: ${RESTORE_MODE:-}
    volumes:
      # Protect backup archives from accidental writes during restore
      - minecraft-server-backups:/backups:ro
      # Restore destination root; script writes to /server/worlds/<world>
      - minecraft-server-data:/server
    stdin_open: true
    tty: true

volumes:
  minecraft-server-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MC_DATA_DIR:-/opt/bedrock/public}

  minecraft-server-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BEDROCKIFIER_BACKUPS_DIR:-/opt/minecraft/backups}
