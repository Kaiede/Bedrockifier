name: Swift CI
on:
  workflow_dispatch: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  linuxBuild:
    name: Swift ${{ matrix.swift-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        swift-version: [6.2.1]
        os: [ubuntu-22.04]

    steps:
    - name: Install Swift
      uses: YOCKOW/Action-setup-swift@v1
      with:
          swift-version: ${{ matrix.swift-version }}
    - name: Checkout
      uses: actions/checkout@v1
    - name: Swift Package Information
      run: |
        swift --version
        swift package show-dependencies
    - name: Build
      run: swift build --build-tests
    - name: Test
      run: swift test
    - name: SwiftLint
      uses: norio-nomura/action-swiftlint@3.2.1
      env:
          WORKING_DIRECTORY: Sources

  macOSBuild:
    name: macOS 26 - Latest Xcode
    runs-on: macOS-26

    steps:
      - name: Configure Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - name: Checkout
        uses: actions/checkout@v1
      - name: Swift Package Information
        run: |
          swift --version
          swift package show-dependencies
      - name: Build
        run: swift build
      - name: Test
        run: swift test -Xlinker -rpath -Xlinker "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.9/macosx"
